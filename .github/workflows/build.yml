# ============================================================
#  This file is a recipe for GitHub's robot kitchen.
#
#  When you push a version tag (like v1.2.0), GitHub borrows
#  three computers — a Windows one, a Mac one, and a Linux one —
#  builds the app on each, and puts all three finished apps on
#  your Releases page. You never need to own a Mac!
# ============================================================
name: Build SKZ Countdown

# WHEN does the robot start cooking?
on:
  push:
    tags: ["v*"]        # ...whenever you push a tag starting with "v"
  workflow_dispatch:    # ...or when you press "Run workflow" by hand

jobs:

  # ---------- Recipe 1: bake the Windows app ----------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Make the .ico icon from our logo photo
        run: python -c "from PIL import Image; Image.open('skz-logo.jpg').save('skz-logo.ico', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])"
      - name: Build .exe
        run: pyinstaller --onefile --windowed --name "SKZ-Countdown" --icon "skz-logo.ico" --add-data "skz-logo.jpg;." --add-data "t&t-logo.png;." --add-data "tracklist.png;." --add-data "assets;assets" --collect-all customtkinter skz_countdown.py
      - uses: actions/upload-artifact@v4
        with:
          name: SKZ-Countdown-Windows
          path: dist/SKZ-Countdown.exe

  # ---------- Recipe 2: bake the Mac app ----------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip3 install -r requirements.txt pyinstaller
      - name: Make the .icns Dock icon from our logo photo
        run: |
          rm -rf skz.iconset && mkdir skz.iconset
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE skz-logo.jpg --out "skz.iconset/icon_${SIZE}x${SIZE}.png"
            DBL=$((SIZE*2))
            sips -z $DBL $DBL skz-logo.jpg --out "skz.iconset/icon_${SIZE}x${SIZE}@2x.png"
          done
          iconutil -c icns skz.iconset -o skz-logo.icns
      - name: Build .app
        run: pyinstaller --onefile --windowed --name "SKZ-Countdown" --icon "skz-logo.icns" --add-data "skz-logo.jpg:." --add-data "t&t-logo.png:." --add-data "tracklist.png:." --add-data "assets:assets" --collect-all customtkinter skz_countdown.py
      - name: Zip the .app bundle
        run: cd dist && zip -r SKZ-Countdown-macOS.zip "SKZ-Countdown.app"
      - uses: actions/upload-artifact@v4
        with:
          name: SKZ-Countdown-macOS
          path: dist/SKZ-Countdown-macOS.zip

  # ---------- Recipe 3: bake the Linux app ----------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip3 install -r requirements.txt pyinstaller
      - name: Build binary
        run: pyinstaller --onefile --windowed --name "skz-countdown" --add-data "skz-logo.jpg:." --add-data "t&t-logo.png:." --add-data "tracklist.png:." --add-data "assets:assets" --collect-all customtkinter skz_countdown.py
      - uses: actions/upload-artifact@v4
        with:
          name: SKZ-Countdown-Linux
          path: dist/skz-countdown

  # ---------- Recipe 4: set the table ----------
  # Wait for all three apps to finish baking, then place them
  # neatly on the Releases page for everyone to download.
  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release with all binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SKZ-Countdown.exe
            artifacts/SKZ-Countdown-macOS.zip
            artifacts/skz-countdown